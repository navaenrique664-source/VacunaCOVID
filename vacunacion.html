<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registrar vacunación</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>Registrar vacunación</header>

<div class="container">
  <h1>Datos de vacuna</h1>

  <label>Vacuna</label>
  <select>
    <option>Pfizer</option>
    <option>Moderna</option>
    <option>AstraZeneca</option>
    <option>Sinovac</option>
  </select>

  <label>Lote</label>
  <input type="text">

  <label>Dosis</label>
  <select>
    <option>Primera dosis</option>
    <option>Segunda dosis</option>
    <option>Refuerzo</option>
  </select>

  <label>Fecha</label>
  <input type="date" value="2026-06-26">

  <label>Centro</label>
  <input type="text" value="Toluca">

  <button>Registrar</button>
  <a class="btn" href="menu.html">Regresar</a>
</div>

</body>
</html>
